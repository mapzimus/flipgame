<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flip Game</title>

  <!-- PWA: installable, offline-capable app -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1b2a">

  <!-- iOS home-screen fallbacks (iOS ignores most manifest install behavior) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flip Game">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Setup ───────────────────────────────────────── -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-card">
      <h1><span class="emoji">🍾</span> Flip Game</h1>

      <div>
        <div class="section-label">Players — pick a name &amp; flavor (🧑 tap for CPU)</div>
        <div id="player-inputs"><!-- rendered by main.js --></div>
        <button id="add-player-btn">+ Add Player</button>
      </div>

      <div>
        <div class="section-label">Pass direction</div>
        <div class="direction-options">
          <label><input type="radio" name="direction" value="1" checked> ➡ Left → Right</label>
          <label><input type="radio" name="direction" value="-1"> ⬅ Right → Left</label>
        </div>
      </div>

      <div>
        <div class="section-label">CPU difficulty</div>
        <div class="direction-options">
          <label><input type="radio" name="difficulty" value="easy"> 🟢 Easy</label>
          <label><input type="radio" name="difficulty" value="medium" checked> 🟡 Medium</label>
          <label><input type="radio" name="difficulty" value="hard"> 🔴 Hard</label>
        </div>
      </div>

      <button id="start-btn">Start Game</button>
      <button id="practice-btn">🎯 Practice (solo)</button>
    </div>
  </div>

  <!-- ── Game ────────────────────────────────────────── -->
  <div id="game-screen" class="screen hidden">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="top-bar">
        <span id="turn-banner"></span>
        <span id="point-count"></span>
      </div>
      <div id="streak-banner"></div>
    </div>
    <div id="flip-hint">Flick up to flip!</div>
    <div id="player-list"></div>
  </div>

  <!-- ── Game Over ────────────────────────────────────── -->
  <div id="game-over" class="screen hidden">
    <div class="game-over-card">
      <div style="font-size:3rem">🏆</div>
      <h2>Winner</h2>
      <div id="winner-name"></div>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="js/vendor/matter.min.js"></script>
  <script src="js/game.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/input.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/main.js"></script>
  <script>
    window.onerror = (msg, src, line) => {
      const el = document.getElementById('err-overlay') || (() => {
        const d = document.createElement('div');
        d.id = 'err-overlay';
        d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);color:#ff5252;font:14px monospace;padding:20px;z-index:9999;white-space:pre-wrap;overflow:auto;';
        document.body.appendChild(d); return d;
      })();
      el.textContent += `[${src?.split('/').pop()}:${line}] ${msg}\n`;
    };

    // Register the service worker for offline play — only on the deployed
    // (non-localhost) site, so it never caches stale files during local dev.
    if ('serviceWorker' in navigator &&
        location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('SW registered, scope:', reg.scope))
          .catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>

</body>
</html>
